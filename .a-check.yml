# .a-check.yml — a-check prüft seine eigene Hexagon-Architektur (Dogfooding,
# AC-QA-02). Schichten gemäß spec/architecture.md (ARC-001..006): der Kern ist
# rein (importiert nichts), die Ports referenzieren den Kern (ports->core,
# AC-FA-RULE-004), Adapter implementieren Ports und referenzieren den Kern; die
# Composition Root (cmd/ + internal/cli/) verdrahtet und ist ausgenommen.
version: 1
languages:
  go: ["**/*.go"]
layers:
  core:     ["internal/hexagon/core/**"]
  ports:    ["internal/hexagon/port/**"]
  adapters: ["internal/adapter/driven/**"]
edges:
  - {from: adapters, to: ports}
  - {from: adapters, to: core}
  - {from: ports,    to: core}
adapter_sink: driver-common
tech:
  - {pattern: "gopkg.in/yaml", adapter: "adapter/driven/config"}
composition_root: ["cmd/**", "internal/cli/**"]
markers:
  ignore_symbols: []
