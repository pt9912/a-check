# .golangci.yml — Lint-Profil von a-check (ADR-0005).
#
# Hard Rule (AGENTS.md §3.2): //nolint-Direktiven im Code sind verboten;
# Ausnahmen leben hier unter `exclusions` mit Why:-Kommentar (§3.6).

version: "2"

linters:
  default: none
  enable:
    # 5 Default-Linter
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # SOLID-nahe Linter (ADR-0005, Parität zum Stack ohne depguard)
    - containedctx
    - contextcheck
    - cyclop
    - dupl
    - fatcontext
    - forbidigo
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - gocyclo
    - gomodguard_v2
    - iface
    - inamedparam
    - interfacebloat
    - ireturn
    - maintidx
    - nestif
    - noctx
    - reassign
    - revive
    - testpackage
    - unparam

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint

    cyclop:
      max-complexity: 15

    dupl:
      threshold: 150

    forbidigo:
      forbid:
        - pattern: ^fmt\.Print.*$
          msg: schreibe über injizierte io.Writer (Reporter-Adapter/CLI), kein direktes Stdout

    funlen:
      lines: 100
      statements: 60

    gocognit:
      min-complexity: 20

    gocyclo:
      min-complexity: 15

    interfacebloat:
      max: 10

    ireturn:
      allow:
        - error
        - empty
        - anon
        - stdlib
        - generic
        # a-check-Ports (ARC-002): New() liefert die Port-Schnittstelle.
        - github.com/pt9912/a-check/internal/hexagon/port\..*

    maintidx:
      under: 20

    nestif:
      min-complexity: 5

    revive:
      # Expliziter Regelblock: mit gesetztem `rules:` läuft NUR diese Liste —
      # daher das revive-Default-Set plus `unused-receiver`.
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming
        - name: unused-receiver

    gomodguard_v2:
      # Anti-Module (ADR-0005): Dependency-Fläche bleibt bei der einen
      # gepinnten YAML-Bibliothek (ADR-0003).
      blocked:
        - module: gopkg.in/yaml.v2
          recommendations:
            - gopkg.in/yaml.v3
          reason: "v2 ist feature-frozen; a-check standardisiert auf v3 (ADR-0003)."
        - module: github.com/pkg/errors
          recommendations:
            - errors
            - fmt
          reason: "stdlib (errors.Is/As/Unwrap + fmt.Errorf %w) deckt alles ab."
        - module: github.com/sirupsen/logrus
          recommendations:
            - log/slog
          reason: "a-check hat keinen Logging-Bedarf jenseits stderr; falls später, dann slog."
        - module: go.uber.org/zap
          recommendations:
            - log/slog
          reason: "wie logrus — slog wäre der stdlib-Standard."

  exclusions:
    generated: lax
    rules:
      # Why: table-driven Tests haben legitim höhere Komplexität ohne
      # Design-Smell.
      - linters:
          - cyclop
          - gocognit
          - gocyclo
          - nestif
          - funlen
        path: _test\.go$

      # Why: Tests gegen Fakes brauchen weder ctx-Propagation noch
      # ausgeschöpfte Parameter.
      - linters:
          - noctx
          - unparam
        path: _test\.go$

      - linters:
          - revive
        path: _test\.go$
        text: ^unused-parameter

      - linters:
          - revive
        path: _test\.go$
        text: ^unused-receiver

      # Why: die Unit-Tests sind bewusst White-Box (unexportierte
      # Analyse-Primitiven wie importsFromSource/stripComments und der
      # Regel-Kern); die Black-Box-Abdeckung der Verträge liegt in den
      # CLI-Akzeptanztests (package cli_test, Folge-Increment).
      - linters:
          - testpackage
        path: internal/
